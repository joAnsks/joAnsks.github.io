<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pastel Bounce ~ Retro Ball Game</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink:   #ffb3c1;
      --peach:  #ffd6a5;
      --mint:   #b5ead7;
      --blue:   #bde0fe;
      --lavend: #cdb4db;
      --yellow: #fdffb6;
      --bg:     #fce4ec;
      --panel:  #fff0f6;
      --shadow: #e0a8c0;
      --text:   #5c3d5e;
      --dark:   #3d2b4e;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      font-family: 'Press Start 2P', monospace;
      color: var(--text);
      overflow-x: hidden;
    }

    header {
      width: 100%;
      padding: 16px 0 10px;
      text-align: center;
      background: linear-gradient(120deg, var(--pink), var(--lavend), var(--blue), var(--mint), var(--peach));
      background-size: 300% 300%;
      animation: shimmer 8s ease infinite;
      box-shadow: 0 4px 0 var(--shadow);
    }
    @keyframes shimmer {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    header h1 {
      font-size: clamp(12px, 3vw, 22px);
      color: var(--dark);
      text-shadow: 2px 2px 0 #fff, 4px 4px 0 var(--shadow);
      letter-spacing: 2px;
    }
    header p {
      margin-top: 5px;
      font-size: clamp(6px, 1.4vw, 9px);
      color: var(--dark);
      opacity: 0.7;
    }

    #hud {
      display: flex;
      gap: 22px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      padding: 8px 20px;
      margin: 12px 0 8px;
      background: var(--panel);
      border: 3px solid var(--shadow);
      border-radius: 12px;
      box-shadow: 4px 4px 0 var(--shadow);
    }
    .hud-item { text-align: center; }
    .hud-label { font-size: 7px; color: var(--lavend); display: block; margin-bottom: 3px; }
    .hud-value { font-size: clamp(10px, 2.5vw, 15px); color: var(--dark); }

    #canvas-wrap {
      position: relative;
      border: 4px solid var(--shadow);
      border-radius: 12px;
      box-shadow: 6px 6px 0 var(--shadow), 0 0 40px rgba(205,180,219,.35);
      overflow: hidden;
      background: #2a1533;
    }
    canvas { display: block; }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: rgba(42, 21, 51, 0.84);
      backdrop-filter: blur(4px);
    }
    #overlay h2 {
      font-size: clamp(12px, 3vw, 20px);
      color: var(--pink);
      text-shadow: 3px 3px 0 var(--dark);
      text-align: center;
      line-height: 1.8;
    }
    #overlay p {
      font-size: clamp(7px, 1.6vw, 10px);
      color: var(--lavend);
      text-align: center;
      line-height: 2.2;
    }

    .btn {
      padding: 10px 22px;
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(8px, 2vw, 11px);
      color: var(--dark);
      background: linear-gradient(135deg, var(--mint), var(--blue));
      border: 3px solid var(--dark);
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 3px 3px 0 var(--dark);
      transition: transform .1s, box-shadow .1s;
    }
    .btn:hover  { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--dark); }
    .btn:active { transform: translate(2px,2px);   box-shadow: 1px 1px 0 var(--dark); }

    #powerup-bar {
      display: flex;
      gap: 10px;
      margin: 6px 0 10px;
      min-height: 22px;
      align-items: center;
      justify-content: center;
      font-size: 7px;
      color: var(--shadow);
    }
    .pu-tag {
      padding: 3px 8px;
      border-radius: 6px;
      border: 2px solid;
      font-size: 6px;
      animation: pulseTag .8s ease infinite alternate;
    }
    @keyframes pulseTag { from { opacity:.6; } to { opacity:1; } }

    #controls-hint {
      margin: 0 0 14px;
      font-size: 7px;
      color: var(--shadow);
      text-align: center;
      line-height: 2.2;
    }

    .hearts { font-size: clamp(10px, 2.5vw, 17px); letter-spacing: 3px; }

    .bubbles { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: -1; }
    .bubble {
      position: absolute;
      border-radius: 50%;
      opacity: .22;
      animation: rise linear infinite;
    }
    @keyframes rise {
      from { transform: translateY(100vh) scale(0.6); opacity: .28; }
      to   { transform: translateY(-120px) scale(1.2); opacity: 0; }
    }
  </style>
</head>
<body>

<div class="bubbles" id="bubbles"></div>

<header>
  <h1>★ Pastel Bounce ★</h1>
  <p>retro brick breaker</p>
</header>

<div id="hud">
  <div class="hud-item">
    <span class="hud-label">SCORE</span>
    <span class="hud-value" id="score-display">0</span>
  </div>
  <div class="hud-item">
    <span class="hud-label">LEVEL</span>
    <span class="hud-value" id="level-display">1</span>
  </div>
  <div class="hud-item">
    <span class="hud-label">LIVES</span>
    <span class="hud-value hearts" id="lives-display">♥♥♥</span>
  </div>
  <div class="hud-item">
    <span class="hud-label">BEST</span>
    <span class="hud-value" id="best-display">0</span>
  </div>
</div>

<div id="canvas-wrap">
  <canvas id="game"></canvas>
  <div id="overlay">
    <h2 id="overlay-title">PASTEL BOUNCE</h2>
    <p id="overlay-msg">Move mouse or use ← → keys<br>to control the paddle.<br><br>Catch power-ups for bonuses!<br><br>SPACE to pause.</p>
    <button class="btn" id="overlay-btn">PLAY ▶</button>
  </div>
</div>

<div id="powerup-bar">POWER-UPS: none</div>

<div id="controls-hint">
  ← → ARROW KEYS &nbsp;|&nbsp; MOUSE / TOUCH &nbsp;|&nbsp; SPACE = PAUSE
</div>

<script>
/* ── Palette ── */
const PASTEL = ['#ffb3c1','#ffd6a5','#b5ead7','#bde0fe','#cdb4db','#fdffb6','#ffc8dd','#a2d2ff'];
const BALL_CLR    = '#fff9fb';
const PADDLE_CLR1 = '#cdb4db';
const PADDLE_CLR2 = '#bde0fe';

/* ── Canvas setup ── */
const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');
const wrap   = document.getElementById('canvas-wrap');

function resize() {
  canvas.width  = Math.floor(Math.min(window.innerWidth - 32, 560));
  canvas.height = Math.floor(Math.min(window.innerHeight * 0.6, 440));
}
resize();
window.addEventListener('resize', () => { resize(); initBricks(); });
const W = () => canvas.width;
const H = () => canvas.height;

/* ── Audio (Web Audio API) ── */
const AC = new (window.AudioContext || window.webkitAudioContext)();
function playTone(freq, type, dur, vol = 0.18) {
  try {
    const o = AC.createOscillator();
    const g = AC.createGain();
    o.connect(g); g.connect(AC.destination);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
    o.start(); o.stop(AC.currentTime + dur);
  } catch(_) {}
}
const sfx = {
  paddle : () => playTone(320, 'sine',   0.08, 0.12),
  brick  : () => playTone(520, 'square', 0.07, 0.10),
  wall   : () => playTone(200, 'sine',   0.06, 0.08),
  life   : () => { playTone(160,'sawtooth',0.25,0.2); setTimeout(()=>playTone(120,'sawtooth',0.25,0.2),80); },
  pu     : () => { [600,750,900].forEach((f,i)=>setTimeout(()=>playTone(f,'sine',0.12,0.15),i*60)); },
  clear  : () => { [500,600,700,900].forEach((f,i)=>setTimeout(()=>playTone(f,'triangle',0.18,0.2),i*80)); },
};
function unlockAudio() { if (AC.state === 'suspended') AC.resume(); }
document.addEventListener('click', unlockAudio, { once: true });
document.addEventListener('keydown', unlockAudio, { once: true });

/* ── State ── */
let state = 'idle';   // idle | playing | paused | dead
let score = 0, best = +localStorage.getItem('pb_best') || 0, lives = 3, level = 1;

/* ── Shake ── */
let shakeT = 0, shakeAmt = 0;
function triggerShake(amt) { shakeT = 12; shakeAmt = amt; }

/* ── Paddle ── */
const PAD = { h: 11, gap: 16, speed: 6 };
let padX, padW, padTargetX, padWidened = 0;
function basePadW() { return W() * 0.18; }
function currentPadW() { return padWidened > 0 ? basePadW() * 1.7 : basePadW(); }
function initPad() { padW = currentPadW(); padX = (W() - padW) / 2; padTargetX = padX; }

/* ── Ball ── */
const BALL_R = 7;
let balls = [];
function makeBall(x, y, dx, dy) {
  return { x, y, dx, dy, trail: [] };
}
function initBall() {
  const spd = 3.5 + level * 0.35;
  const dir = (Math.random() < 0.5 ? 1 : -1);
  balls = [makeBall(W()/2, H() - PAD.gap - PAD.h - BALL_R - 10, dir * spd, -spd)];
}

/* ── Bricks ── */
const COLS = 10;
let ROWS;
const BRICK_GAP = 5;
let bricks = [], brickW, brickH;

const LAYOUTS = [
  null,   // level 1 — standard fill
  'diamond',
  'checkerboard',
  'pyramid',
  'cross',
];

function initBricks() {
  ROWS = Math.min(4 + Math.floor(level / 2), 8);
  brickW = (W() - (COLS + 1) * BRICK_GAP) / COLS;
  brickH = Math.max(14, H() * 0.045);
  bricks = [];
  const layout = LAYOUTS[Math.min(level - 1, LAYOUTS.length - 1)];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      let alive = true;
      if (layout === 'diamond') {
        const mid = (COLS - 1) / 2, rmid = (ROWS - 1) / 2;
        alive = (Math.abs(c - mid) + Math.abs(r - rmid)) <= Math.min(mid, rmid) + 1;
      } else if (layout === 'checkerboard') {
        alive = (r + c) % 2 === 0;
      } else if (layout === 'pyramid') {
        const margin = Math.floor(r / 2);
        alive = c >= margin && c < COLS - margin;
      } else if (layout === 'cross') {
        alive = r === Math.floor(ROWS / 2) || c === Math.floor(COLS / 2);
      }
      if (!alive) continue;
      const hp = level >= 3 && r < 2 ? 2 : 1;
      bricks.push({
        x: BRICK_GAP + c * (brickW + BRICK_GAP),
        y: 38 + r * (brickH + BRICK_GAP),
        color: PASTEL[(r * COLS + c) % PASTEL.length],
        pts: (ROWS - r) * 10,
        hp, maxHp: hp,
        shimmer: Math.random() * Math.PI * 2,
        alive: true,
        pu: alive && Math.random() < 0.11 ? randomPUType() : null,
      });
    }
  }
}

/* ── Power-ups ── */
const PU_TYPES = [
  { id: 'wide',   label: 'WIDE',      color: '#b5ead7', borderColor: '#5c9e83' },
  { id: 'multi',  label: 'MULTIBALL', color: '#ffc8dd', borderColor: '#c0607a' },
  { id: 'slow',   label: 'SLOW',      color: '#bde0fe', borderColor: '#5a8fc0' },
  { id: 'life',   label: '+LIFE',     color: '#fdffb6', borderColor: '#a0a050' },
];
function randomPUType() { return PU_TYPES[Math.floor(Math.random() * PU_TYPES.length)]; }

let drops = [];         // falling power-up capsules
let activePUs = {};     // { wide: timeLeft, slow: timeLeft }

function spawnDrop(bx, by, puType) {
  drops.push({ x: bx, y: by, vy: 2, type: puType, alive: true });
}

function applyPU(type) {
  sfx.pu();
  if (type.id === 'wide') {
    padWidened = 600;
  } else if (type.id === 'multi') {
    const extras = balls.slice(0, 1).map(b =>
      makeBall(b.x, b.y, -b.dx + (Math.random()-.5), b.dy)
    );
    balls.push(...extras);
  } else if (type.id === 'slow') {
    activePUs.slow = 500;
    balls.forEach(b => {
      const spd = Math.hypot(b.dx, b.dy);
      if (spd > 2) { b.dx *= 0.6; b.dy *= 0.6; }
    });
  } else if (type.id === 'life') {
    lives = Math.min(lives + 1, 5);
    updateHUD();
  }
}

function tickPUs() {
  if (padWidened > 0) {
    padWidened--;
    padW = currentPadW();
  }
  if (activePUs.slow > 0) activePUs.slow--;
}

function puBarHTML() {
  const tags = [];
  if (padWidened > 0)     tags.push({ label: 'WIDE', color: '#b5ead7', border: '#5c9e83' });
  if (activePUs.slow > 0) tags.push({ label: 'SLOW', color: '#bde0fe', border: '#5a8fc0' });
  if (tags.length === 0) return 'POWER-UPS: none';
  return tags.map(t =>
    `<span class="pu-tag" style="background:${t.color};border-color:${t.border};color:#3d2b4e">${t.label}</span>`
  ).join('');
}

/* ── Particles ── */
let particles = [];
function burst(x, y, color, n = 14) {
  for (let i = 0; i < n; i++) {
    const angle = (Math.PI * 2 / n) * i + Math.random() * 0.4;
    const spd   = 1.5 + Math.random() * 2.5;
    particles.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      r: 2 + Math.random() * 3,
      color,
      life: 1,
      decay: 0.025 + Math.random() * 0.02
    });
  }
}

/* ── HUD ── */
function updateHUD() {
  document.getElementById('score-display').textContent = score;
  document.getElementById('level-display').textContent = level;
  document.getElementById('lives-display').textContent = '♥'.repeat(Math.max(0, lives));
  best = Math.max(best, score);
  document.getElementById('best-display').textContent = best;
  document.getElementById('powerup-bar').innerHTML = puBarHTML();
}

/* ── Overlay ── */
const overlay = document.getElementById('overlay');
const oTitle  = document.getElementById('overlay-title');
const oMsg    = document.getElementById('overlay-msg');
const oBtn    = document.getElementById('overlay-btn');
function showOverlay(title, msg, btnTxt) {
  oTitle.textContent = title;
  oMsg.innerHTML     = msg;
  oBtn.textContent   = btnTxt;
  overlay.style.display = 'flex';
}
function hideOverlay() { overlay.style.display = 'none'; }

/* ── Input ── */
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ') {
    e.preventDefault();
    if (state === 'playing') pause();
    else if (state === 'paused') resume();
  }
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

let mouseX = null;
wrap.addEventListener('mousemove', e => {
  if (state !== 'playing') return;
  const rect = canvas.getBoundingClientRect();
  mouseX = e.clientX - rect.left - padW / 2;
});
wrap.addEventListener('mouseleave', () => { mouseX = null; });

wrap.addEventListener('touchmove', e => {
  if (state !== 'playing') return;
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  mouseX = e.touches[0].clientX - rect.left - padW / 2;
}, { passive: false });

function clampPad() {
  padX = Math.max(0, Math.min(W() - padW, padX));
}

/* ── Collision helpers ── */
function ballHitsBrick(ball, b) {
  return ball.x + BALL_R > b.x && ball.x - BALL_R < b.x + brickW &&
         ball.y + BALL_R > b.y && ball.y - BALL_R < b.y + brickH;
}

/* ── Update ── */
function update() {
  tickPUs();
  updateHUD();

  /* Paddle movement */
  if (mouseX !== null) {
    padX += (mouseX - padX) * 0.3;
  }
  if (keys['ArrowLeft']  || keys['a']) { padX -= PAD.speed + level * 0.5; mouseX = null; }
  if (keys['ArrowRight'] || keys['d']) { padX += PAD.speed + level * 0.5; mouseX = null; }
  clampPad();

  /* Balls */
  for (let bi = balls.length - 1; bi >= 0; bi--) {
    const ball = balls[bi];

    ball.trail.push({ x: ball.x, y: ball.y });
    if (ball.trail.length > 9) ball.trail.shift();

    ball.x += ball.dx;
    ball.y += ball.dy;

    /* Wall bounce */
    if (ball.x - BALL_R < 0)   { ball.x = BALL_R;     ball.dx =  Math.abs(ball.dx); sfx.wall(); }
    if (ball.x + BALL_R > W()) { ball.x = W()-BALL_R; ball.dx = -Math.abs(ball.dx); sfx.wall(); }
    if (ball.y - BALL_R < 0)   { ball.y = BALL_R;     ball.dy =  Math.abs(ball.dy); sfx.wall(); }

    /* Paddle bounce */
    const padTop = H() - PAD.gap - PAD.h;
    if (ball.dy > 0 &&
        ball.y + BALL_R >= padTop &&
        ball.y - BALL_R <= padTop + PAD.h &&
        ball.x > padX - 4 &&
        ball.x < padX + padW + 4) {
      ball.dy = -Math.abs(ball.dy);
      const rel = (ball.x - padX) / padW;
      ball.dx   = (rel - 0.5) * (8 + level * 0.4);
      const spd = Math.hypot(ball.dx, ball.dy);
      const target = (activePUs.slow > 0 ? 2.5 : 3.5) + level * 0.35;
      ball.dx *= target / spd;
      ball.dy *= target / spd;
      ball.y = padTop - BALL_R;
      sfx.paddle();
    }

    /* Brick collisions */
    for (const b of bricks) {
      if (!b.alive) continue;
      if (ballHitsBrick(ball, b)) {
        const overlapX = Math.min(ball.x + BALL_R - b.x, b.x + brickW - (ball.x - BALL_R));
        const overlapY = Math.min(ball.y + BALL_R - b.y, b.y + brickH - (ball.y - BALL_R));
        if (overlapX < overlapY) ball.dx = -ball.dx;
        else                     ball.dy = -ball.dy;
        b.hp--;
        sfx.brick();
        if (b.hp <= 0) {
          b.alive = false;
          score += b.pts * level;
          burst(b.x + brickW / 2, b.y + brickH / 2, b.color);
          if (b.pu) spawnDrop(b.x + brickW / 2, b.y + brickH / 2, b.pu);
        } else {
          burst(b.x + brickW / 2, b.y + brickH / 2, '#fff', 5);
        }
        break;
      }
    }

    /* Ball lost */
    if (ball.y - BALL_R > H()) {
      balls.splice(bi, 1);
    }
  }

  /* No balls left */
  if (balls.length === 0) {
    lives--;
    sfx.life();
    triggerShake(7);
    updateHUD();
    if (lives <= 0) { gameOver(); return; }
    initBall();
  }

  /* Level clear */
  if (bricks.every(b => !b.alive)) {
    sfx.clear();
    level++;
    updateHUD();
    nextLevel();
    return;
  }

  /* Drop updates */
  const padTop = H() - PAD.gap - PAD.h;
  for (let di = drops.length - 1; di >= 0; di--) {
    const d = drops[di];
    if (!d.alive) { drops.splice(di, 1); continue; }
    d.y += d.vy;
    if (d.y > padTop && d.y < padTop + PAD.h + 12 &&
        d.x > padX && d.x < padX + padW) {
      applyPU(d.type);
      d.alive = false;
      drops.splice(di, 1);
      continue;
    }
    if (d.y > H() + 20) { drops.splice(di, 1); }
  }

  /* Particles */
  bricks.forEach(b => { b.shimmer += 0.03; });
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.08;
    p.life -= p.decay;
    p.r   *= 0.97;
  });
  particles = particles.filter(p => p.life > 0);

  /* Shake decay */
  if (shakeT > 0) shakeT--;
}

/* ── Draw ── */
function draw() {
  /* Shake offset */
  let sx = 0, sy = 0;
  if (shakeT > 0) {
    sx = (Math.random() - 0.5) * shakeAmt;
    sy = (Math.random() - 0.5) * shakeAmt;
  }
  ctx.save();
  ctx.translate(sx, sy);

  /* Background */
  ctx.fillStyle = '#2a1533';
  ctx.fillRect(0, 0, W(), H());

  /* Grid lines */
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W(); x += 30) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H()); ctx.stroke(); }
  for (let y = 0; y < H(); y += 30) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W(),y); ctx.stroke(); }

  /* Bricks */
  bricks.forEach(b => {
    if (!b.alive) return;
    const glow    = 0.5 + 0.5 * Math.sin(b.shimmer);
    const cracked = b.hp < b.maxHp;
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.beginPath(); ctx.roundRect(b.x + 3, b.y + 3, brickW, brickH, 4); ctx.fill();
    ctx.fillStyle = cracked ? shadeColor(b.color, -30) : b.color;
    ctx.beginPath(); ctx.roundRect(b.x, b.y, brickW, brickH, 4); ctx.fill();
    /* Shine */
    ctx.fillStyle = `rgba(255,255,255,${0.14 + glow * 0.17})`;
    ctx.beginPath(); ctx.roundRect(b.x + 2, b.y + 2, brickW - 4, brickH * 0.42, 3); ctx.fill();
    /* Crack marks for damaged bricks */
    if (cracked) {
      ctx.strokeStyle = 'rgba(0,0,0,0.4)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(b.x + brickW * 0.3, b.y + 2);
      ctx.lineTo(b.x + brickW * 0.5, b.y + brickH * 0.6);
      ctx.lineTo(b.x + brickW * 0.7, b.y + brickH - 2);
      ctx.stroke();
    }
    /* Point label */
    ctx.fillStyle = 'rgba(40,20,50,0.7)';
    ctx.font = `bold ${Math.max(7, brickH * 0.36)}px 'Press Start 2P', monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(b.pts, b.x + brickW / 2, b.y + brickH / 2);
  });

  /* Drops */
  drops.forEach(d => {
    const pulse = 0.7 + 0.3 * Math.sin(Date.now() / 180);
    ctx.save();
    ctx.shadowColor = d.type.color;
    ctx.shadowBlur  = 8 * pulse;
    ctx.fillStyle = d.type.color;
    ctx.strokeStyle = d.type.borderColor;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.roundRect(d.x - 18, d.y - 8, 36, 16, 8);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = '#3d2b4e';
    ctx.font = '5px "Press Start 2P", monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(d.type.label, d.x, d.y);
    ctx.restore();
  });

  /* Particles */
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle   = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
  });
  ctx.globalAlpha = 1;

  /* Ball trails + balls */
  balls.forEach(ball => {
    ball.trail.forEach((t, i) => {
      ctx.globalAlpha = (i / ball.trail.length) * 0.38;
      ctx.fillStyle   = BALL_CLR;
      ctx.beginPath();
      ctx.arc(t.x, t.y, BALL_R * (i / ball.trail.length) * 0.65, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;
    /* Glow */
    const grd = ctx.createRadialGradient(ball.x, ball.y, 0, ball.x, ball.y, BALL_R * 2.6);
    grd.addColorStop(0, 'rgba(255,240,255,0.5)');
    grd.addColorStop(1, 'rgba(255,180,210,0)');
    ctx.fillStyle = grd;
    ctx.beginPath(); ctx.arc(ball.x, ball.y, BALL_R * 2.6, 0, Math.PI * 2); ctx.fill();
    /* Ball */
    ctx.fillStyle = BALL_CLR;
    ctx.beginPath(); ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI * 2); ctx.fill();
    /* Specular */
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.beginPath(); ctx.arc(ball.x - 2, ball.y - 2, BALL_R * 0.35, 0, Math.PI * 2); ctx.fill();
  });
  ctx.globalAlpha = 1;

  /* Paddle */
  const padTop = H() - PAD.gap - PAD.h;
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath(); ctx.roundRect(padX + 3, padTop + 3, padW, PAD.h, 6); ctx.fill();
  const padGrd = ctx.createLinearGradient(padX, 0, padX + padW, 0);
  padGrd.addColorStop(0, padWidened > 0 ? '#b5ead7' : PADDLE_CLR1);
  padGrd.addColorStop(1, padWidened > 0 ? '#a2d2ff' : PADDLE_CLR2);
  ctx.fillStyle = padGrd;
  ctx.beginPath(); ctx.roundRect(padX, padTop, padW, PAD.h, 6); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.beginPath(); ctx.roundRect(padX + 4, padTop + 2, padW - 8, PAD.h * 0.38, 3); ctx.fill();

  /* Danger zone line */
  ctx.strokeStyle = 'rgba(255,100,120,0.1)';
  ctx.lineWidth = 1;
  ctx.setLineDash([6,6]);
  ctx.beginPath(); ctx.moveTo(0, H() - 2); ctx.lineTo(W(), H() - 2); ctx.stroke();
  ctx.setLineDash([]);

  ctx.restore();
}

/* ── Game loop ── */
function loop() {
  if (state === 'playing') { update(); draw(); }
  requestAnimationFrame(loop);
}

/* ── State transitions ── */
function startGame() {
  score = 0; lives = 3; level = 1;
  drops = []; particles = []; activePUs = {}; padWidened = 0;
  initPad(); initBall(); initBricks();
  updateHUD();
  hideOverlay();
  state = 'playing';
}

function nextLevel() {
  state = 'idle';
  drops = []; activePUs = {}; padWidened = 0;
  showOverlay(`LEVEL ${level}!`, `Score: ${score}<br><br>✦ Get ready... ✦`, 'NEXT ▶');
  initBall(); initBricks(); initPad();
}

function pause() {
  state = 'paused';
  showOverlay('PAUSED', 'Press SPACE or click to resume.', 'RESUME ▶');
}

function resume() {
  hideOverlay();
  state = 'playing';
}

function gameOver() {
  state = 'dead';
  if (score > best) { best = score; localStorage.setItem('pb_best', best); }
  updateHUD();
  showOverlay('GAME OVER',
    `Final score: ${score}<br><br>${score >= best && score > 0 ? '✦ New Best! ✦' : `Best: ${best}`}`,
    'PLAY AGAIN ▶');
}

oBtn.addEventListener('click', () => {
  if (state === 'paused') resume();
  else startGame();
});

/* ── Utility ── */
function shadeColor(hex, pct) {
  const n = parseInt(hex.slice(1), 16);
  const r = Math.max(0, Math.min(255, (n >> 16) + pct));
  const g = Math.max(0, Math.min(255, ((n >> 8) & 0xff) + pct));
  const b = Math.max(0, Math.min(255, (n & 0xff) + pct));
  return `rgb(${r},${g},${b})`;
}

/* ── Background bubbles ── */
(function spawnBubbles() {
  const container = document.getElementById('bubbles');
  const colors = ['#ffb3c1','#cdb4db','#bde0fe','#b5ead7','#ffd6a5'];
  for (let i = 0; i < 22; i++) {
    const d = document.createElement('div');
    d.className = 'bubble';
    const size = 18 + Math.random() * 58;
    d.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;bottom:-80px;background:${colors[i%colors.length]};animation-duration:${6+Math.random()*10}s;animation-delay:${Math.random()*10}s;`;
    container.appendChild(d);
  }
})();

/* ── Boot ── */
initPad(); initBall(); initBricks();
updateHUD();
loop();
</script>
